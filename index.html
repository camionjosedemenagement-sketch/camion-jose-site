<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Camion José Transport & Déménagement - Antananarivo, Madagascar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html { scroll-behavior: smooth; }

body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
text-align:center;
background-color:#f2f2f2;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
z-index:1000;
background-color:rgba(230,0,0,0.85);
}
nav ul{
list-style:none;
margin:0;
padding:10px 0;
display:flex;
justify-content:center;
gap:20px;
}
nav ul li a{
color:white;
text-decoration:none;
font-weight:bold;
padding:10px 20px;
}

/* HEADER */
header{
height:400px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:url('jok.jpeg') center/cover;
}
.btn-call{
padding:12px 25px;
background:#e60000;
color:white;
border-radius:8px;
text-decoration:none;
}

/* SERVICES */
.services{background:white;padding:50px 20px;}
.service-list{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.service-item{background:#f9f9f9;padding:20px;width:260px;border-radius:10px;}
.btn-service{background:#e60000;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;}

/* SLIDER FIX */
.slider{
position:relative;
max-width:250px;
height:180px;
overflow:hidden;
margin:auto;
}
.slides{
display:flex;
transition:transform 0.5s ease;
}
.slides img{
width:100%;
flex-shrink:0;
object-fit:cover;
}

/* GALERIE */
.gallery{background:white;padding:50px;}
.gallery-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.gallery-item img{width:250px;border-radius:10px;}

/* VIDEOS */
.realisations{
background:white;
padding:50px 20px;
}
.videos-container{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}
.videos-container video{
width:300px;
border-radius:10px;
}

/* CONTACT */
.contact{background:#e60000;color:white;padding:50px;}
.contact-form{background:white;color:black;padding:20px;border-radius:10px;max-width:500px;margin:auto;}

/* WHATSAPP */
.whatsapp-btn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

/* DEVIS */
.devis{padding:50px;background:white;}
.devis-form{max-width:500px;margin:auto;}
.devis-form input,select,textarea{
width:100%;
margin-bottom:10px;
padding:10px;
}

/* RESPONSIVE */
@media(max-width:600px){
.service-list{flex-direction:column;align-items:center;}
}
</style>
</head>

<body>

<nav>
<ul>
<li><a href="#header">Accueil</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#realisations">Nos réalisations</a></li>
<li><a href="#gallery">Galerie</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<header id="header">
<h1>Camion José Transport & Déménagement</h1>
<p>Service rapide - 034 42 913 61</p>
<a href="tel:0344291361" class="btn-call">Appeler</a>
</header>

<section class="services" id="services">
<h2>Nos Services</h2>

<div class="service-item">
<h3>Déménagement</h3>

<div class="slider">
<div class="slides">
<img src="manutention.jpeg">
<img src="emballage.jpeg">
<img src="chargement.jpeg">
</div>
</div>

</div>
</section>

<section class="realisations" id="realisations">
<h2>Nos réalisations</h2>

<div class="videos-container">
<video controls src="demo1.mp4"></video>
<video controls src="demo2.mp4"></video>
<video controls src="demo3.mp4"></video>
</div>

</section>

<section class="gallery" id="gallery">
<h2>Galerie</h2>
<div class="gallery-grid">
<img src="jok.jpeg">
<img src="gomme.jpeg">
<img src="DOUBLE.jpeg">
</div>
</section>

<section class="devis" id="devis">
<h2>Demander un devis</h2>
<form class="devis-form" action="https://formspree.io/f/xwvwyzoq" method="POST">
<input type="text" placeholder="Nom" required>
<input type="tel" placeholder="Téléphone" required>
<select>
<option>Choisir service</option>
</select>
<button>Envoyer</button>
</form>
</section>

<section class="contact" id="contact">
<h2>Contact</h2>

<p>📞 034 42 913 61</p>

<p>
<a href="https://www.facebook.com/profile.php?id=61578163626500" target="_blank">
Facebook
</a>
</p>

<iframe src="https://www.google.com/maps?q=Tanjombato+Antananarivo&output=embed" width="100%" height="250"></iframe>

</section>

<a href="#devis" class="whatsapp-btn">📩</a>

<script>
// SLIDER CORRIGÉ
document.querySelectorAll('.slider').forEach(slider=>{
let index=0;
const slides=slider.querySelector('.slides');
const total=slides.children.length;

function show(){
slides.style.transform=`translateX(-${index*100}%)`;
}

setInterval(()=>{
index=(index+1)%total;
show();
},3000);
});
</script>

</body>
</html>
